services:
  postgres:
    image: postgres:16-alpine
    container_name: otp_ticket_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: otp_ticket_db
      POSTGRES_USER: otp_user
      POSTGRES_PASSWORD: otp_password
      TZ: America/Bogota
      PGTZ: America/Bogota
    command: ["postgres", "-c", "timezone=America/Bogota"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otp_user -d otp_ticket_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: otp_ticket_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
